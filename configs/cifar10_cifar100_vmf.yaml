experiment: cifar10_vs_cifar100_first_angle_vmf_like
seed: 100
device: auto
data_dir: data
output_dir: runs/cifar10_vs_cifar100_vmf
download: true
num_workers: 2
checkpoint: checkpoints/cifar10_vmf_like_z128_ec0.pt
pretrained: null

model:
  latent_dim: 128
  channels: [16, 32, 64]
  normalize_samples: true

compression:
  mode: vmf_like
  end_compress: 0
  class_axis_stride: 10

training:
  epochs: 300
  batch_size: 200
  lr_encoder: 0.0002
  lr_decoder: 0.0002
  beta_target: 2500.0
  initial_beta: 1.0
  milestones: [280, 450]
  save_every: 50
  resume: false

evaluation:
  batch_size: 512
  knn_k: 3
  legacy_train_augmentation: false
